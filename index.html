<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金服云 - 保函管理系统</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-amber-50 to-orange-50">
    <div class="min-h-screen flex flex-col">
        <header class="bg-white shadow-sm border-b border-gray-100">
            <div class="max-w-6xl mx-auto px-6 py-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-gradient-to-r from-amber-500 to-amber-600 rounded-lg flex items-center justify-center">
                            <i class="fa fa-shield text-white text-xl"></i>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold text-gray-900">金服云</h1>
                            <p class="text-xs text-gray-500">保函管理系统</p>
                        </div>
                    </div>
                    <div class="text-sm text-gray-500">
                        欢迎使用
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 flex items-center justify-center p-8">
            <div class="w-full max-w-4xl">
                <div class="text-center mb-12">
                    <h2 class="text-4xl font-bold text-gray-900 mb-4">保函服务平台</h2>
                    <p class="text-gray-600">一站式保函申请与管理解决方案</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <a href="标后保函.html" class="group bg-white rounded-2xl shadow-sm border border-gray-100 p-8 hover:shadow-lg hover:border-amber-200 transition-all duration-300">
                        <div class="flex items-start space-x-4">
                            <div class="w-14 h-14 bg-gradient-to-r from-amber-100 to-orange-100 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                <i class="fa fa-file-text text-amber-600 text-2xl"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-lg font-semibold text-gray-900 mb-2">标后保函申请</h3>
                                <p class="text-sm text-gray-500">在线申请工程质量保函、履约保函等标后保函服务</p>
                            </div>
                            <div class="text-amber-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fa fa-arrow-right"></i>
                            </div>
                        </div>
                    </a>

                    <a href="订单查询.html" class="group bg-white rounded-2xl shadow-sm border border-gray-100 p-8 hover:shadow-lg hover:border-amber-200 transition-all duration-300">
                        <div class="flex items-start space-x-4">
                            <div class="w-14 h-14 bg-gradient-to-r from-blue-100 to-indigo-100 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                <i class="fa fa-search text-blue-600 text-2xl"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-lg font-semibold text-gray-900 mb-2">订单查询</h3>
                                <p class="text-sm text-gray-500">查询投标保函、工程质量保函、履约保函订单状态</p>
                            </div>
                            <div class="text-blue-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fa fa-arrow-right"></i>
                            </div>
                        </div>
                    </a>

                    <a href="标后订单管理.html" class="group bg-white rounded-2xl shadow-sm border border-gray-100 p-8 hover:shadow-lg hover:border-amber-200 transition-all duration-300">
                        <div class="flex items-start space-x-4">
                            <div class="w-14 h-14 bg-gradient-to-r from-green-100 to-emerald-100 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                <i class="fa fa-tasks text-green-600 text-2xl"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-lg font-semibold text-gray-900 mb-2">订单管理</h3>
                                <p class="text-sm text-gray-500">管理端订单审批、支付审核、保函上传等操作</p>
                            </div>
                            <div class="text-green-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fa fa-arrow-right"></i>
                            </div>
                        </div>
                    </a>

                    <a href="工程质量保函订单.html" class="group bg-white rounded-2xl shadow-sm border border-gray-100 p-8 hover:shadow-lg hover:border-amber-200 transition-all duration-300">
                        <div class="flex items-start space-x-4">
                            <div class="w-14 h-14 bg-gradient-to-r from-purple-100 to-violet-100 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                <i class="fa fa-building text-purple-600 text-2xl"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-lg font-semibold text-gray-900 mb-2">工程质量保函</h3>
                                <p class="text-sm text-gray-500">查看和管理工程质量保函订单详情</p>
                            </div>
                            <div class="text-purple-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fa fa-arrow-right"></i>
                            </div>
                        </div>
                    </a>

                    <a href="履约保函订单.html" class="group bg-white rounded-2xl shadow-sm border border-gray-100 p-8 hover:shadow-lg hover:border-amber-200 transition-all duration-300">
                        <div class="flex items-start space-x-4">
                            <div class="w-14 h-14 bg-gradient-to-r from-rose-100 to-pink-100 rounded-xl flex items-center justify-center group-hover:scale-110 transition-transform">
                                <i class="fa fa-handshake text-rose-600 text-2xl"></i>
                            </div>
                            <div class="flex-1">
                                <h3 class="text-lg font-semibold text-gray-900 mb-2">履约保函</h3>
                                <p class="text-sm text-gray-500">查看和管理履约保函订单详情</p>
                            </div>
                            <div class="text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fa fa-arrow-right"></i>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="mt-12 bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4 text-center">系统统计</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                        <div class="text-center">
                            <div class="text-3xl font-bold text-amber-600">128</div>
                            <div class="text-sm text-gray-500 mt-1">订单总数</div>
                        </div>
                        <div class="text-center">
                            <div class="text-3xl font-bold text-green-600">45</div>
                            <div class="text-sm text-gray-500 mt-1">已出函</div>
                        </div>
                        <div class="text-center">
                            <div class="text-3xl font-bold text-blue-600">23</div>
                            <div class="text-sm text-gray-500 mt-1">审批中</div>
                        </div>
                        <div class="text-center">
                            <div class="text-3xl font-bold text-orange-600">60</div>
                            <div class="text-sm text-gray-500 mt-1">已支付</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-white border-t border-gray-100 py-6">
            <div class="max-w-6xl mx-auto px-6 text-center">
                <p class="text-sm text-gray-500">金服云保函管理系统 © 2026</p>
            </div>
        </footer>
    </div>
</body>
</html>
